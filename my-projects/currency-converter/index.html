<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="currency-converter.css">
  <link rel="stylesheet" href="/global/css/nav.css">
</head>

<body>
  <div id="nav-container"></div>
  <section class="currency-converter-section">
    <!-- LEFT SIDE -->
    <div class="converter-left">
      <h1>Currency <br>
        Converter
      </h1>

      <p>Live exchange rates. Fast. Accurate. Simple.</p>

      <div class="currency-bg-wrapper">
        <img src="/assets/images/currency-bg-img.png" alt="Currency background" class="currency-bg-img">
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="converter-card">
      <!-- FROM -->
      <div class="currency-group">
        <label for="from-currency">From</label>
        <div class="currency-select" id="fromCurrencySelect">
          <div class="currency-info">
            <img src="https://flagcdn.com/us.svg" alt="USD" class="flag-icon">
            <span class="currency-code" id="fromCurrencyCode">USD</span>
            <span class="currency-name" id="fromCurrencyName">US Dollar</span>
          </div>
          
          <img src="/assets/icons/dropdown-down.png" alt="Dropdown Icon" class="dropdown-icon">
        </div>
        
        <div class="currency-dropdown" id="fromCurrencyDropdown"></div>
        
        <input type="number" value="1000" class="currency-input">
      </div>

      <!-- SWITCH -->
      <button class="swap-btn">⇅</button>

      <!-- TO -->
      <div class="currency-group">
        <label for="to-currency">To</label>
        <div class="currency-select" id="toCurrencySelect">
          <div class="currency-info">
            <img src="https://flagcdn.com/eu.svg" alt="EUR" class="flag-icon">
            <span class="currency-code" id="toCurrencyCode">EUR</span>
            <span class="currency-name" id="toCurrencyName">Euro</span>
          </div>

          <img src="/assets/icons/dropdown-down.png" alt="Dropdown Icon" class="dropdown-icon">
        </div>
        <div class="currency-dropdown" id="toCurrencyDropdown"></div>

        <input type="text" value="921.20" class="currency-input converted-input" readonly>
      </div>

      <!-- RATE -->
      <div class="exchange-rate">
        <span>1 USD = 0.9212 EUR</span>
        <div class="live-status">
          <span class="live-dot"></span>
          <span>Live</span>
        </div>
      </div>

      <!-- UPDATED -->
      <p class="last-updated">Last updated: 2 mins ago</p>
    </div>
  </section>

  <script src="/global/js/nav.js"></script>
  <script src="/global/js/currency-data.js"></script>
  <script src="currency-converter.js"></script>

</body>
</html>
