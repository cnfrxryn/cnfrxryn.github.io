<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Tracker</title>

  <link rel="stylesheet" href="/global/css/nav.css">
  <link rel="stylesheet" href="task-tracker.css">
</head>

<body>

<!-- NAV (reuse existing) -->
<div id="nav-container"></div>

<div class="container">

  <!-- HEADER -->
  <header class="header">
    <div class="left">
      <h1>My Tasks</h1>
    </div>
  </header>

  <!-- TOGGLE -->
  <div class="toggle-container">
    <button class="toggle active">ACTIVE</button>
    <button class="toggle">COMPLETED</button>
  </div>

  <!-- SUMMARY -->
  <section class="summary">

    <div class="summary-cards">

      <div class="card">
        <div class="card-top">
          <span class="card-title">Total Tasks</span>
          <img src="/assets/icons/total-tasks.png" class="card-icon">
        </div>
        <h3>40</h3>
      </div>

      <div class="card clickable">
        <div class="card-top">
          <span class="card-title">High Priority</span>
          <img src="/assets/icons/high-priority.png" class="card-icon">
        </div>
        <h3>20</h3>
      </div>

      <div class="card">
        <div class="card-top">
          <span class="card-title">Due Soon</span>
          <img src="/assets/icons/due-date.png" class="card-icon">
        </div>
        <h3>20</h3>
      </div>

    </div>

    <div class="summary-actions">
      <button class="btn-primary">+ Add New</button>

      <div class="dropdown">
        <button class="btn-primary">
          ↓ Download
        </button>

        <div class="dropdown-menu">
          <button>.XLS</button>
          <button>.PDF</button>
        </div>
      </div>
    </div>

  </section>

  <!-- CONTROLS -->
  <section class="controls">

    <!-- SEARCH -->
    <div class="search-box">
      <img src="/assets/icons/search.png" class="search-icon">
      <span class="divider">|</span>
      <input type="text" placeholder="Search...">
    </div>

    <!-- FILTER BUTTON -->
    <button class="btn-filter">FILTERS</button>

    <!-- MARK COMPLETE -->
    <button class="btn-complete hidden">Mark as Completed</button>

  </section>

  <!-- TABLE -->
  <section class="table-container">

    <table>
      <thead>
        <tr>
          <th><input type="checkbox"></th>
          <th></th>
          <th>TASK</th>
          <th>PRIORITY</th>
          <th>DEADLINE</th>
          <th>STATUS</th>
        </tr>
      </thead>

      <tbody>

        <tr class="task-row">
          <td><input type="checkbox"></td>
          <td><img src="/assets/icons/edit-task.png" class="edit-icon"></td>
          <td>Create a task table</td>
          <td>
            High <img src="/assets/icons/high-priority.png" class="priority-icon">
          </td>
          <td>May 1, 2026</td>
          <td>Not Started</td>
        </tr>

        <tr class="task-row">
          <td><input type="checkbox"></td>
          <td><img src="/assets/icons/edit-task.png" class="edit-icon"></td>
          <td>Develop Tiny Thinkers</td>
          <td>
            High <img src="/assets/icons/high-priority.png" class="priority-icon">
          </td>
          <td>May 2, 2026</td>
          <td>In Progress</td>
        </tr>

      </tbody>
    </table>

    <!-- PAGINATION -->
    <div class="pagination">
      <span class="page active">1</span>
      <span class="page">2</span>
      <span class="page">3</span>
      <span class="page">4</span>
      <span>›</span>
    </div>

  </section>

</div>

<script src="/global/js/nav.js"></script>

</body>
</html>
