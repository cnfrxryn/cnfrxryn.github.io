<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Tracker</title>

  <link rel="stylesheet" href="/global/css/nav.css">
  <link rel="stylesheet" href="task-tracker.css">
</head>

<body>

<!-- NAV (reuse existing) -->
<div id="nav-container"></div>

<div class="container">

  <!-- HEADER -->
  <header class="header">
    <div class="left">
      <h1>My Tasks</h1>
    </div>
  </header>

  <!-- SUMMARY -->
  <section class="summary">

    <div class="summary-cards">

      <div class="card">
        <div class="card-top">
          <span class="card-title">Total Tasks</span>
          <img src="/assets/icons/total-tasks.png" class="card-icon">
        </div>
        <h3>40</h3>
      </div>

      <div class="card clickable">
        <div class="card-top">
          <span class="card-title">High Priority</span>
          <img src="/assets/icons/high-priority.png" class="card-icon">
        </div>
        <h3>20</h3>
      </div>

      <div class="card">
        <div class="card-top">
          <span class="card-title">At Risk</span>
          <img src="/assets/icons/due-date.png" class="card-icon">
        </div>
        <h3>20</h3>
      </div>

    </div>

    <div class="summary-actions">
      <button class="btn-primary" onclick="openModal()">+ Add New</button>

      <div class="dropdown">
        <button class="btn-primary">
          ↓ Download
        </button>

        <div class="dropdown-menu">
          <button>.XLS</button>
          <button>.PDF</button>
        </div>
      </div>
    </div>

  </section>

  <!-- CONTROLS -->
  <section class="controls">

    <!-- SEARCH -->
    <div class="search-box">
      <img src="/assets/icons/search.png" class="search-icon">
      <span class="divider">|</span>
      <input type="text" placeholder="Search...">
    </div>

    <!-- FILTER BUTTON -->
    <button class="btn-filter" onclick="openFilterModal()">
      <img src="/assets/icons/filter-table.png" class="filter-icon">FILTERS
    </button>

    <!-- MARK COMPLETE -->
    <button class="btn-complete hidden">Mark as Completed</button>

  </section>

  <!-- TABLE -->
  <section class="table-container">
    <!-- TOGGLE -->
    <div class="table-tabs">
      <button class="toggle active">ACTIVE</button>
      <button class="toggle">COMPLETED</button>
    </div>

    <table>
      <thead>
        <tr>
          <th><input type="checkbox" id="selectAll"></th>
          <th>TASK</th>
          <th>PRIORITY</th>
          <th>DEADLINE</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>

  </section>

</div>

<!-- MODALS -->
<div id="modals">
  <!-- CREATE TASK MODAL -->
  <div class="modal" id="taskModal">

    <div class="modal-content">

      <div class="modal-header">
        <h3>Create New Task</h3>
        <span class="close-btn" onclick="closeModal()">✕</span>
      </div>

      <form id="taskForm">

        <input id="taskTitle" type="text" placeholder="Task name" required>

        <textarea id="taskDescription" placeholder="Description"></textarea>

        <select id="taskPriority" required>
          <option value="">Select priority</option>
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>

        <input id="taskDeadline" type="date" required>

        <select id="taskStatus" required>
          <option value="">Select status</option>
          <option>Not Started</option>
          <option>In Progress</option>
        </select>

        <button type="button" onclick="createTask()">Create</button>

      </form>

    </div>

  </div>

  <!-- VIEW / EDIT TASK MODAL -->
  <div class="modal" id="viewModal">

    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">
        <h3 id="viewTitle">Task Title</h3>
        <span class="close-btn" onclick="closeViewModal()">✕</span>
      </div>

      <!-- DESCRIPTION -->
      <div class="view-description" id="viewDescription"></div>

      <!-- INFO CARDS -->
      <div class="view-cards">

        <div class="view-card">
          <span>Priority</span>
          <div class="view-value">
            <span id="viewPriority">High</span>
            <img src="/assets/icons/high-priority.png">
          </div>
        </div>

        <div class="view-card">
          <span>Status</span>
          <div class="view-value">
            <span id="viewStatus">In Progress</span>
            <img src="/assets/icons/in-progress.png">
          </div>
        </div>

        <div class="view-card">
          <span>Deadline</span>
          <div class="view-value">
            <span id="viewDeadline">May 3, 2026</span>
            <img src="/assets/icons/due-date.png">
          </div>
        </div>

      </div>

      <div class="view-created" id="viewCreated"></div>

      <!-- ACTION -->
      <button class="btn-update" onclick="editTask()">Edit Task</button>

    </div>

  </div>

  <!-- FILTER MODAL -->
  <div class="modal" id="filterModal">

    <div class="modal-content">

      <div class="modal-header">
        <h3>Filter Tasks</h3>
      </div>

      <div class="filter-body">

        <select id="filterPriority">
          <option value="">All Priorities</option>
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>

        <select id="filterStatus">
          <option value="">All Status</option>
          <option>Not Started</option>
          <option>In Progress</option>
          <option>Completed</option>
        </select>

      </div>

      <div class="filter-actions">
        <button onclick="closeFilterModal()">Cancel</button>
        <button onclick="applyFilters()">Apply</button>
      </div>

    </div>

  </div>
</div>

<script src="/global/js/nav.js"></script>
<script src="task-tracker.js"></script>

</body>
</html>
