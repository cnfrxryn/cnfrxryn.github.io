<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>
    Generate Currency Data
  </title>
</head>

<body>
  <button id="generateBtn">Generate Currency Data</button>
  <pre id="output"></pre>
  <script>
    const generateBtn = document.getElementById("generateBtn");
    const output = document.getElementById("output");
    generateBtn.addEventListener("click", async () => {
        try {

          /* FETCH COUNTRIES */
          const response = await fetch("https://restcountries.com/v3.1/all");
          const countries = await response.json();

          /* STORE UNIQUE CURRENCIES */
          const currencyMap = new Map();
          countries.forEach((country) => {
            if (!country.currencies) return;
            const currencies = country.currencies;
            Object.entries(currencies).forEach(([code, currencyData]) => {
                if (!currencyMap.has(code)) {
                  currencyMap.set(code, {
                      code,
                      name: currencyData.name || "",
                      symbol: currencyData.symbol || "",
                      countryCode: (country.cca2 || "").toLowerCase()
                    });
                }
              });
          });

          /* CONVERT TO ARRAY */
          const currencyArray = Array.from(currencyMap.values());

          /* SORT ALPHABETICALLY */
          currencyArray.sort((a, b) => a.code.localeCompare(b.code));

          /* GENERATE JS FILE CONTENT */
          const finalOutput = `const currencies = ${JSON.stringify(currencyArray, null, 2)};`;

          /* SHOW OUTPUT */
          output.textContent = finalOutput;
          console.log(currencyArray);
        }

        catch (error) {
          console.error(error);
          output.textContent = "Error generating currency data.";
        }
      }
    );

  </script>
</body>
</html>
